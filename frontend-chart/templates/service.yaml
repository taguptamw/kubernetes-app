apiVersion: v1
kind: Service
metadata:
name: frontend-svc
namespace: {{ .Release.Namespace }}
labels:
  app: frontend
  chart: {{ .Chart.Name }}
spec:
type: {{ .Values.service.type }}
ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.port }}
    nodePort: {{ .Values.service.nodePort }}
selector:
  app: frontend
  release: {{ .Release.Name }}